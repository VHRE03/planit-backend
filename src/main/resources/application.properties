# ==============================================
# General application configuration
# ==============================================
spring.application.name=planit
# ==============================================
# Swagger / OpenAPI
# ==============================================
# Path where Swagger UI will be available
springdoc.swagger-ui.path=/api-docs
# ==============================================
# Database configuration (PostgreSQL)
# ==============================================
# Sensitive data (URL, username, password) are stored in an external file
# that MUST NOT be versioned in the repository.
#
# Expected file: secrets-dev.properties (inside src/main/resources/)
#
# Required content of secrets-dev.properties:
# ----------------------------------------------
# spring.datasource.url=jdbc:postgresql://<IP>:<PORT>/<DB_NAME>
# spring.datasource.username=<USERNAME>
# spring.datasource.password=<PASSWORD>
# spring.datasource.driver-class-name=org.postgresql.Driver
# ----------------------------------------------
#
# Note: The 'optional:' prefix prevents startup failure if the file is missing
# (useful in environments without local secrets).
spring.config.import=optional:secrets-dev.properties
# ==============================================
# JPA / Hibernate configuration
# ==============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ==============================================
# Flyway
# ==============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public